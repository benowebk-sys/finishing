<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finishing</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&family=Noto+Sans+Arabic:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --weaving-accent: #d4af37;
            --success: #27ae60;
            --error: #c0392b;
        }

        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            background: radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 18%),
                        radial-gradient(circle at bottom right, rgba(212,175,55,0.06), transparent 15%),
                        linear-gradient(180deg, #05070f 0%, #070b14 45%, #03050a 100%);
            min-height: 100vh;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .cinematic-header {
            background: rgba(8, 12, 20, 0.94);
            background-image: radial-gradient(circle at top left, rgba(212,175,55,0.12), transparent 25%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.18);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .material-title {
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 14px rgba(212, 175, 55, 0.35);
            letter-spacing: 0.05em;
        }

        .glass-card {
            background: rgba(11, 17, 31, 0.90);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            box-shadow: 0 30px 65px rgba(0, 0, 0, 0.35);
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255,255,255,0.18);
        }

        /* Glassy Success Style */
        .btn-correct { 
            background: rgba(39, 174, 96, 0.28) !important; 
            border-color: rgba(46, 204, 113, 0.55) !important; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white !important;
            box-shadow: 0 0 18px rgba(39, 174, 96, 0.24);
        }

        /* Glassy Error Style */
        .btn-wrong { 
            background: rgba(192, 57, 43, 0.28) !important; 
            border-color: rgba(231, 76, 60, 0.55) !important; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white !important;
            box-shadow: 0 0 18px rgba(192, 57, 43, 0.24);
        }

        /* Enhanced Progress Bar Container */
        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .progress-bar-wrapper {
            height: 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, rgba(245,158,11,0.95), rgba(252,211,77,0.95), rgba(249,115,22,0.95));
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 24px rgba(249, 115, 22, 0.35);
        }

        .arabic-text {
            font-family: 'Noto Sans Arabic', sans-serif;
            display: block;
            margin-top: 0.15rem;
            opacity: 0.8;
            font-size: 0.85em;
        }

        @media (max-width: 640px) {
            .nav-text { display: inline-block; } 
            #qText { font-size: 1rem; }
            .option-btn { padding: 0.65rem; }
            .nav-btn-container { padding: 0.5rem 0.75rem; }
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header -->
    <header class="cinematic-header py-3 px-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="material-title text-lg md:text-2xl font-bold text-yellow-500 uppercase">Finishing</h1>
            <div class="flex flex-col items-end">
                <div class="text-[10px] md:text-xs opacity-60 font-mono bg-white/5 px-2 py-1 rounded border border-white/10 mb-1" id="progressText">
                    Q 1 / 134
                </div>
                <div id="percentageLabel" class="text-[10px] font-bold text-yellow-500/80">0%</div>
            </div>
        </div>
    </header>

    <!-- Percentage Progress Bar -->
    <div class="progress-container">
        <div class="max-w-4xl mx-auto">
            <div class="progress-bar-wrapper">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Main -->
    <main class="flex-grow flex items-center justify-center p-3 md:p-6">
        <div id="quizContainer" class="w-full max-w-xl">
            <div class="flex justify-end mb-2">
                <button id="hintBtn" class="p-2 bg-yellow-500/10 text-yellow-500 rounded-full border border-yellow-500/20" title="Show Hint">
                    <i data-lucide="lightbulb" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="glass-card p-5 md:p-8 relative">
                <div id="hintBox" class="hidden mb-4 p-3 bg-yellow-500/10 border border-yellow-500/20 rounded text-[11px] md:text-sm italic text-yellow-200">
                    <div id="hintContent"></div>
                </div>

                <div id="questionArea">
                    <span id="qType" class="text-[9px] uppercase tracking-widest text-yellow-500/60 font-bold mb-1 block"></span>
                    <h2 id="qText" class="font-light leading-snug mb-5 text-white"></h2>
                    <div id="optionsGrid" class="grid grid-cols-1 gap-2"></div>
                </div>

                <div class="flex justify-between items-center mt-6 border-t border-white/5 pt-5">
                    <button id="prevBtn" onclick="prevQuestion()" class="nav-btn-container flex items-center gap-1.5 px-3 py-2 rounded bg-white/5 text-xs disabled:opacity-20">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i> <span class="nav-text">Back/السابق</span>
                    </button>
                    <div class="flex gap-2">
                        <button onclick="skipQuestion()" class="px-3 py-2 rounded border border-white/5 text-[10px] opacity-50">Skip/تخطي</button>
                        <button id="nextBtn" onclick="nextQuestion()" class="nav-btn-container flex items-center gap-1.5 px-5 py-2 rounded bg-yellow-600 text-white font-bold text-xs">
                            <span class="nav-text">Next/التالي</span> <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div id="resultScreen" class="hidden w-full max-w-md text-center glass-card p-8">
            <i data-lucide="award" class="w-12 h-12 text-yellow-500 mx-auto mb-4"></i>
            <h2 class="text-xl font-bold mb-1">Assessment Complete</h2>
            <p class="text-[10px] text-gray-500 mb-6">نهايه الاختبار</p>
            <div class="text-5xl font-bold text-yellow-500 mb-2" id="finalScore">0%</div>
            <div class="grid grid-cols-2 gap-2 mt-6">
                <div class="p-3 bg-green-500/5 border border-green-500/10 rounded">
                    <div id="correctCount" class="text-green-500 font-bold">0</div>
                    <div class="text-[9px] opacity-50 uppercase">Correct</div>
                </div>
                <div class="p-3 bg-red-500/5 border border-red-500/10 rounded">
                    <div id="wrongCount" class="text-red-500 font-bold">0</div>
                    <div class="text-[9px] opacity-50 uppercase">Wrong</div>
                </div>
            </div>
            <button onclick="restartQuiz()" class="mt-8 bg-yellow-600 text-white px-8 py-2 rounded-full text-xs font-bold">Restart</button>
        </div>
    </main>

    <footer class="py-4 text-center border-t border-white/5 bg-black/20">
        <p class="text-gray-500 text-[13px] font-medium">By <span class="text-yellow-500/60">Developer Bilal Mohammed</span></p>
    </footer>

    <script>
        const rawData = [
            // --- 70 True & False Questions ---
            {type:'tf',q:'Processing cotton in yarn form is more common than in fabric form.',a:'False',q_ar:'معالجة القطن في شكل خيوط هي أكثر شيوعاً من شكل القماش.',a_ar:'خطأ'},
            {type:'tf',q:'Lot uniformity (width & weight) is essential for consistent chemical processing.',a:'True',q_ar:'توحيد الدفعة (العرض والوزن) ضروري لمعالجة كيميائية متسقة.',a_ar:'صح'},
            {type:'tf',q:'Seam strength has no effect on continuous processing operations.',a:'False',q_ar:'قوة الوصلة ليس لها تأثير على عمليات المعالجة المستمرة.',a_ar:'خطأ'},
            {type:'tf',q:'Bonding using polymers eliminates mechanical stress caused by stitching.',a:'True',q_ar:'الربط باستخدام البوليمرات يزيل الإجهاد الميكانيكي الناتج عن الخياطة.',a_ar:'صح'},
            {type:'tf',q:'Improper inspection can lead to defects during bleaching and dyeing stages.',a:'True',q_ar:'التفتيش غير السليم قد يؤدي إلى عيوب خلال مراحل التبييض والصباغة.',a_ar:'صح'},
            {type:'tf',q:'Electronic inspection completely eliminates the need for human supervision.',a:'False',q_ar:'التفتيش الإلكتروني يزيل تماماً الحاجة للإشراف البشري.',a_ar:'خطأ'},
            {type:'tf',q:'Non-scourable oils interfere with dye-fiber interaction.',a:'True',q_ar:'الزيوت غير القابلة للإزالة تتداخل مع تفاعل الصبغة والألياف.',a_ar:'صح'},
            {type:'tf',q:'Cutting damaged areas is always avoided to reduce material loss.',a:'False',q_ar:'يتم دائماً تجنب قطع المناطق التالفة لتقليل فقد المواد.',a_ar:'خطأ'},
            {type:'tf',q:'Fluorescent lighting enhances visibility of fabric defects.',a:'True',q_ar:'الإضاءة الفلورية تعزز من وضوح عيوب القماش.',a_ar:'صح'},
            {type:'tf',q:'Spotting should be followed by drying before washing to fix the stain remover.',a:'False',q_ar:'يجب أن يتبع إزالة البقع التجفيف قبل الغسيل لتثبيت مزيل البقع.',a_ar:'خطأ'},
            {type:'tf',q:'Uniform lot formation minimizes variation in chemical uptake during processing.',a:'True',q_ar:'تكوين دفعة موحدة يقلل من التباين في امتصاص المواد الكيميائية أثناء المعالجة.',a_ar:'صح'},
            {type:'tf',q:'Sewing seams too narrow may lead to failure during tension processes.',a:'True',q_ar:'خياطة الوصلات الضيقة جداً قد تؤدي إلى فشلها خلال عمليات الشد.',a_ar:'صح'},
            {type:'tf',q:'Polymer bonding increases rag formation compared to stitching.',a:'False',q_ar:'الربط بالبوليمر يزيد من تكوين الخرق مقارنة بالخياطة.',a_ar:'خطأ'},
            {type:'tf',q:'Inspection under insufficient light may hide critical fabric defects.',a:'True',q_ar:'التفتيش تحت ضوء غير كافٍ قد يخفي عيوب القماش الحرجة.',a_ar:'صح'},
            {type:'tf',q:'Cutting heavily damaged areas is sometimes necessary despite material loss.',a:'True',q_ar:'قطع المناطق المتضررة بشدة ضروري أحياناً رغم فقدان المواد.',a_ar:'صح'},
            {type:'tf',q:'Oily stains can lead to localized weak spots during bleaching.',a:'True',q_ar:'يمكن أن تؤدي البقع الزيتية إلى نقاط ضعف موضعية أثناء التبييض.',a_ar:'صح'},
            {type:'tf',q:'Electronic inspection ensures zero defects in final fabric.',a:'False',q_ar:'التفتيش الإلكتروني يضمن خلو القماش النهائي من العيوب.',a_ar:'خطأ'},
            {type:'tf',q:'Similar fabric weight in a lot ensures uniform drying rate.',a:'True',q_ar:'وزن القماش المتماثل في الدفعة يضمن معدل تجفيف موحد.',a_ar:'صح'},
            {type:'tf',q:'The purpose of mending is only aesthetic improvement.',a:'False',q_ar:'الغرض من الترقيع هو التحسين الجمالي فقط.',a_ar:'خطأ'},
            {type:'tf',q:'Emulsified solvents improve removal of hydrophobic contaminants.',a:'True',q_ar:'المذيبات المستحلبة تحسن إزالة الملوثات الطاردة للماء.',a_ar:'صح'},
            {type:'tf',q:'Protruding fibers improve dye penetration during dyeing processes.',a:'False',q_ar:'الألياف البارزة تحسن اختراق الصبغة أثناء عمليات الصباغة.',a_ar:'خطأ'},
            {type:'tf',q:'Shearing is used to remove surface fibers from fabric.',a:'True',q_ar:'يستخدم القص (Shearing) لإزالة الألياف السطحية من القماش.',a_ar:'صح'},
            {type:'tf',q:'Shearing is always performed on fully wet fabrics.',a:'False',q_ar:'يتم القص دائماً على الأقمشة المبللة تماماً.',a_ar:'خطأ'},
            {type:'tf',q:'The shearing mechanism is similar to a lawn mower.',a:'True',q_ar:'آلية القص تشبه جزازة العشب.',a_ar:'صح'},
            {type:'tf',q:'Cylinder speed in shearing machines is always constant.',a:'False',q_ar:'سرعة الأسطوانة في آلات القص ثابتة دائماً.',a_ar:'خطأ'},
            {type:'tf',q:'Modern shearing machines may have asymmetrical spiral arrangements.',a:'True',q_ar:'آلات القص الحديثة قد تحتوي على ترتيبات لولبية غير متماثلة.',a_ar:'صح'},
            {type:'tf',q:'Spiral blades are aligned in the same direction as cylinder rotation.',a:'False',q_ar:'تتم محاذاة الشفرات اللولبية في نفس اتجاه دوران الأسطوانة.',a_ar:'خطأ'},
            {type:'tf',q:'Increasing cutting angle improves cutting precision.',a:'False',q_ar:'زيادة زاوية القطع تحسن من دقة القص.',a_ar:'خطأ'},
            {type:'tf',q:'Ledger blade hardness is usually higher than spiral blades.',a:'False',q_ar:'صلابة نصل (Ledger blade) عادة ما تكون أعلى من الشفرات اللولبية.',a_ar:'خطأ'},
            {type:'tf',q:'Wear of the ledger blade is economically advantageous.',a:'True',q_ar:'تآكل نصل (Ledger blade) مفيد اقتصادياً.',a_ar:'صح'},
            {type:'tf',q:'Seam joints can safely pass under the shearing device.',a:'False',q_ar:'يمكن لوصلات الدرزة المرور بأمان تحت جهاز القص.',a_ar:'خطأ'},
            {type:'tf',q:'Seam sensors prevent damage during shearing.',a:'True',q_ar:'حساسات الوصلة تمنع الضرر أثناء القص.',a_ar:'صح'},
            {type:'tf',q:'Brushes before and after shearing perform identical functions.',a:'False',q_ar:'الفرش قبل وبعد القص تؤدي وظائف متطابقة.',a_ar:'خطأ'},
            {type:'tf',q:'Vacuum systems only clean the machine without affecting fabric quality.',a:'False',q_ar:'أنظمة الشفط تنظف الماكينة فقط دون التأثير على جودة القماش.',a_ar:'خطأ'},
            {type:'tf',q:'Shearing reduces microbeads in polyester fabrics.',a:'True',q_ar:'القص يقلل من الخرزات الدقيقة في أقمشة البوليستر.',a_ar:'صح'},
            {type:'tf',q:'Fabric thickness has no effect on shear height adjustment.',a:'False',q_ar:'سمك القماش ليس له أي تأثير على ضبط ارتفاع القص.',a_ar:'خطأ'},
            {type:'tf',q:'Eccentric cylinder movement can cause uneven shearing.',a:'True',q_ar:'حركة الأسطوانة اللامركزية يمكن أن تسبب قصاً غير متساوٍ.',a_ar:'صح'},
            {type:'tf',q:'Modern shearing machines are fully manual.',a:'False',q_ar:'آلات القص الحديثة يدوية بالكامل.',a_ar:'خطأ'},
            {type:'tf',q:'Scratching cotton fabric during shearing may cause dyeing defects.',a:'True',q_ar:'خدش قماش القطن أثناء القص قد يسبب عيوباً في الصباغة.',a_ar:'صح'},
            {type:'tf',q:'Increasing fabric speed always improves shearing efficiency.',a:'False',q_ar:'زيادة سرعة القماش يحسن دائماً كفاءة القص.',a_ar:'خطأ'},
            {type:'tf',q:'Singeing removes protruding fibers to improve fabric smoothness.',a:'True',q_ar:'الغناء (Singeing) يزيل الألياف البارزة لتحسين نعومة القماش.',a_ar:'صح'},
            {type:'tf',q:'Only cotton fabrics require singeing; synthetic fabrics are not singed.',a:'False',q_ar:'أقمشة القطن فقط تتطلب الغناء؛ الأقمشة الاصطناعية لا يتم غناؤها.',a_ar:'خطأ'},
            {type:'tf',q:'Protruding fibers can obstruct dyeing and printing processes.',a:'True',q_ar:'الألياف البارزة يمكن أن تعيق عمليات الصباغة والطباعة.',a_ar:'صح'},
            {type:'tf',q:'Double singeing may be used to minimize pilling in polyester blends.',a:'True',q_ar:'الغناء المزدوج قد يستخدم لتقليل التنسيل في مخاليط البوليستر.',a_ar:'صح'},
            {type:'tf',q:'Passing fabric over heated cylinders while wet improves singeing results.',a:'False',q_ar:'تمرير القماش فوق أسطوانات ساخنة وهو مبلل يحسن نتائج الغناء.',a_ar:'خطأ'},
            {type:'tf',q:'Improper singeing may cause loss of tensile strength in warp direction.',a:'True',q_ar:'الغناء غير السليم قد يسبب فقدان قوة الشد في اتجاه السداء.',a_ar:'صح'},
            {type:'tf',q:'In gas singeing, a steam buffer can hinder the operation.',a:'True',q_ar:'في غناء الغاز، الحاجز البخاري يمكن أن يعيق العملية.',a_ar:'صح'},
            {type:'tf',q:'Polyester ignites at a higher temperature than it melts.',a:'True',q_ar:'البوليستر يشتعل عند درجة حرارة أعلى من درجة انصهاره.',a_ar:'صح'},
            {type:'tf',q:'All singeing machines use the same method of flame application.',a:'False',q_ar:'جميع آلات الغناء تستخدم نفس طريقة تطبيق اللهب.',a_ar:'خطأ'},
            {type:'tf',q:'Quench boxes extinguish sparks after singeing to prevent fabric damage.',a:'True',q_ar:'صناديق الإطفاء تخمد الشرر بعد الغناء لمنع تلف القماش.',a_ar:'صح'},
            {type:'tf',q:'Desizing is the process of removing sizing materials from warp threads after weaving.',a:'True',q_ar:'إزالة البوش هي عملية إزالة مواد البوش من خيوط السداء بعد النسيج.',a_ar:'صح'},
            {type:'tf',q:'Starch and gelatin are examples of synthetic sizing agents.',a:'False',q_ar:'النشا والجيلاتين أمثلة على مواد البوش الاصطناعية.',a_ar:'خطأ'},
            {type:'tf',q:'Enzymatic desizing is preferred because it does not damage cellulose fibers.',a:'True',q_ar:'إزالة البوش الإنزيمية مفضلة لأنها لا تتلف ألياف السليلوز.',a_ar:'صح'},
            {type:'tf',q:'Mineral acids are completely safe for cotton fibers during desizing.',a:'False',q_ar:'الأحماض المعدنية آمنة تماماً لألياف القطن أثناء إزالة البوش.',a_ar:'خطأ'},
            {type:'tf',q:'Oxidation desizing using sodium bromate can hydrolyze starch at room temperature.',a:'True',q_ar:'إزالة البوش بالأكسدة باستخدام برومات الصوديوم يمكن أن تحلل النشا في درجة حرارة الغرفة.',a_ar:'صح'},
            {type:'tf',q:'Alkali after-treatment is sometimes required after oxidation desizing.',a:'True',q_ar:'المعالجة القلوية اللاحقة مطلوبة أحياناً بعد إزالة البوش بالأكسدة.',a_ar:'صح'},
            {type:'tf',q:'Pectin must be removed during scouring to improve absorption and dyeing.',a:'True',q_ar:'يجب إزالة البكتين أثناء التنظيف لتحسين الامتصاص والصباغة.',a_ar:'صح'},
            {type:'tf',q:'Cotton requires mild alkaline treatment compared to wool and silk.',a:'False',q_ar:'يتطلب القطن معالجة قلوية خفيفة مقارنة بالصوف والحرير.',a_ar:'خطأ'},
            {type:'tf',q:'Continuous bleaching processes may be affected by the presence of mineral salts.',a:'True',q_ar:'عمليات التبييض المستمرة قد تتأثر بوجود الأملاح المعدنية.',a_ar:'صح'},
            {type:'tf',q:'Hydrogen peroxide is a safe alternative to chlorine compounds in bleaching.',a:'True',q_ar:'بيروكسيد الهيدروجين هو بديل آمن لمركبات الكلور في التبييض.',a_ar:'صح'},
            {type:'tf',q:'Synthetic fibers require aggressive scouring with high alkali concentrations.',a:'False',q_ar:'تتطلب الألياف الاصطناعية تنظيفاً قوياً بتركيزات قلوية عالية.',a_ar:'خطأ'},
            {type:'tf',q:'Thermal stabilization is sometimes necessary for synthetic fibers to achieve high whiteness.',a:'True',q_ar:'التثبيت الحراري ضروري أحياناً للألياف الاصطناعية لتحقيق بياض عالٍ.',a_ar:'صح'},
            {type:'tf',q:'Wool and silk are sensitive to strong alkalis and require mild bleaching.',a:'True',q_ar:'الصوف والحرير حساسان للقلويات القوية ويتطلبان تبييضاً خفيفاً.',a_ar:'صح'},
            {type:'tf',q:'Mercerization is carried out using hot caustic soda and high tension.',a:'False',q_ar:'تتم عملية المرسرة باستخدام الصودا الكاوية الساخنة والشد العالي.',a_ar:'خطأ'},
            {type:'tf',q:'Mercerization increases fiber cross-section and gives a circular shape.',a:'True',q_ar:'المرسرة تزيد من المقطع العرضي للألياف وتعطيها شكلاً دائرياً.',a_ar:'صح'},

        ];

        let idx = 0, userAns = new Array(rawData.length).fill(null);

        function render() {
            const q = rawData[idx];
            const answered = userAns[idx] !== null;
            
            // Progress Calculation
            const progressPct = Math.round(((idx + 1) / rawData.length) * 100);
            
            // Update Progress UI
            document.getElementById('progressText').innerText = `Q ${idx + 1} / ${rawData.length}`;
            document.getElementById('percentageLabel').innerText = `${progressPct}%`;
            document.getElementById('progressFill').style.width = `${progressPct}%`;
            
            document.getElementById('qType').innerText = q.type === 'tf' ? 'True / False | صح أم خطأ' : 'Choice | اختيار من متعدد';
            document.getElementById('qText').innerHTML = `<div>${q.q}</div><div class="arabic-text text-yellow-500/80" dir="rtl">${q.q_ar}</div>`;
            document.getElementById('hintContent').innerHTML = `<div>${q.h || "Review the process logic based on the materials provided."}</div><div class="arabic-text opacity-50" dir="rtl">${q.h_ar || "راجع منطق العملية بناءً على المواد المقدمة."}</div>`;
            document.getElementById('hintBox').classList.add('hidden');

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            const optsEn = q.type === 'tf' ? ['True', 'False'] : q.o;
            const optsAr = q.type === 'tf' ? ['صح', 'خطأ'] : q.o_ar;

            optsEn.forEach((en, i) => {
                const btn = document.createElement('button');
                btn.className = `option-btn w-full p-3 rounded-lg text-xs md:text-sm text-left relative overflow-hidden group`;
                btn.innerHTML = `<span class="block text-white">${en}</span><span class="arabic-text text-white/40" dir="rtl">${optsAr[i]}</span>`;
                btn.onclick = () => select(en, btn);
                if(answered) {
                    btn.disabled = true;
                    if(en === q.a) btn.classList.add('btn-correct');
                    if(en === userAns[idx] && en !== q.a) btn.classList.add('btn-wrong');
                }
                grid.appendChild(btn);
            });
            document.getElementById('prevBtn').disabled = idx === 0;
        }

        function select(val, btn) {
            if(userAns[idx] !== null) return;
            userAns[idx] = val;
            if(val === rawData[idx].a) btn.classList.add('btn-correct');
            else {
                btn.classList.add('btn-wrong');
                Array.from(document.querySelectorAll('.option-btn')).forEach(b => { 
                    if(b.innerText.includes(rawData[idx].a)) b.classList.add('btn-correct'); 
                });
            }
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        }

        function nextQuestion() { idx < rawData.length - 1 ? (idx++, render()) : show(); }
        function prevQuestion() { if(idx > 0) { idx--; render(); } }
        function skipQuestion() { nextQuestion(); }
        
        function show() {
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            const correct = userAns.reduce((acc, v, i) => v === rawData[i].a ? acc + 1 : acc, 0);
            document.getElementById('finalScore').innerText = Math.round((correct/rawData.length)*100) + "%";
            document.getElementById('correctCount').innerText = correct;
            document.getElementById('wrongCount').innerText = rawData.length - correct;
        }
        
        function restartQuiz() { idx=0; userAns.fill(null); document.getElementById('resultScreen').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); render(); }
        
        window.onload = () => { 
            lucide.createIcons(); 
            render(); 
            document.getElementById('hintBtn').onclick = () => document.getElementById('hintBox').classList.toggle('hidden'); 
        };
    </script>
