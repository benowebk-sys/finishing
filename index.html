<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finishing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&family=Noto+Sans+Arabic:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --weaving-accent: #d4af37;
            --success: #27ae60;
            --error: #c0392b;
        }

        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            background: radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 18%),
                        radial-gradient(circle at bottom right, rgba(212,175,55,0.06), transparent 15%),
                        linear-gradient(180deg, #05070f 0%, #070b14 45%, #03050a 100%);
            min-height: 100vh;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .cinematic-header {
            background: rgba(8, 12, 20, 0.94);
            background-image: radial-gradient(circle at top left, rgba(212,175,55,0.12), transparent 25%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.18);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
            -webkit-backdrop-filter: blur(18px);
            backdrop-filter: blur(18px);
        }

        .material-title {
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 14px rgba(212, 175, 55, 0.35);
            letter-spacing: 0.05em;
        }

        .glass-card {
            background: rgba(11, 17, 31, 0.90);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            box-shadow: 0 30px 65px rgba(0, 0, 0, 0.35);
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255,255,255,0.18);
        }

        /* Glassy Success Style */
        .btn-correct { 
            background: rgba(39, 174, 96, 0.28) !important; 
            border-color: rgba(46, 204, 113, 0.55) !important; 
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            color: white !important;
            box-shadow: 0 0 18px rgba(39, 174, 96, 0.24);
        }

        /* Glassy Error Style */
        .btn-wrong { 
            background: rgba(192, 57, 43, 0.28) !important; 
            border-color: rgba(231, 76, 60, 0.55) !important; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white !important;
            box-shadow: 0 0 18px rgba(192, 57, 43, 0.24);
        }

        /* Enhanced Progress Bar Container */
        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .progress-bar-wrapper {
            height: 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, rgba(245,158,11,0.95), rgba(252,211,77,0.95), rgba(249,115,22,0.95));
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 24px rgba(249, 115, 22, 0.35);
        }

       .status-pill {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 11px;
    white-space: nowrap;
}
        #progressText.status-pill {
            font-size: 0.72rem;
            color: rgba(226, 232, 240, 0.75);
            text-transform: uppercase;
        }

        #percentageLabel.status-pill {
            font-size: 0.95rem;
            color: #facc15;
            font-weight: 700;
            text-shadow: 0 0 12px rgba(250, 204, 21, 0.22);
        }

        #score-pill.status-pill {
            font-size: 0.76rem;
            color: rgba(255, 255, 255, 0.92);
            font-weight: 700;
        }

       
        .result-metric {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05);
        }

        .result-metric-value {
            font-size: 1.35rem;
            letter-spacing: 0.02em;
            font-weight: 800;
        }

        .result-metric-label {
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .result-message-text {
            font-size: 0.93rem;
            color: #d8d8d8;
            line-height: 1.75;
        }

        .result-message-text.positive {
            color: #f9d462;
        }

        .result-message-text.negative {
            color: #f0e6bf;
        }

        .bebo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 1rem auto 0.5rem auto;
            max-width: 300px;
            position: relative;
            z-index: 10;
            gap: 0.5rem;
        }

        @media (min-width: 768px) {
            .bebo-wrapper { 
                align-items: flex-end; 
                margin-right: 2rem; 
                margin: 1.5rem auto 1rem auto;
                max-width: 360px;
                gap: 1rem;
            }
        }

        .bebo-bubble {
            background: rgba(25, 32, 48, 0.96);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 12px 14px;
            border-radius: 18px;
            font-size: 0.85rem;
            color: #fff;
            margin-bottom: 8px;
            box-shadow: 0 24px 70px rgba(0,0,0,0.35);
            max-width: 280px;
            transition: all 0.35s ease;
            opacity: 1;
            transform: translateY(0);
            font-family: 'Noto Sans Arabic', sans-serif;
            text-align: right;
            direction: rtl;
            pointer-events: none;
            position: relative;
        }

        @media (min-width: 768px) {
            .bebo-bubble {
                padding: 16px 18px;
                border-radius: 22px;
                font-size: 0.95rem;
                max-width: 360px;
            }
        }

        .bebo-bubble.active {
            opacity: 1;
            transform: translateY(-4px);
        }

        .bebo-robot {
            width: 60px;
            height: 60px;
            background: #292234;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.14);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            box-shadow: inset 0 8px 18px rgba(255,255,255,0.08), 0 30px 60px rgba(0,0,0,0.25);
            transform-style: preserve-3d;
            position: relative;
        }

        @media (min-width: 768px) {
            .bebo-robot {
                width: 82px;
                height: 82px;
                border-radius: 28px;
            }
        }

        .bebo-robot.flash {
            animation: robotFlash 0.45s ease;
        }

        @keyframes robotFlash {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); box-shadow: inset 0 8px 20px rgba(255,255,255,0.12), 0 40px 80px rgba(255,255,255,0.1); }
            100% { transform: scale(1); }
        }

        .bebo-robot::before {
            content: '';
            position: absolute;
            inset: 6px 8px auto auto;
            width: 24px;
            height: 18px;
            background: rgba(255,255,255,0.06);
            border-radius: 100px 100px 0 0;
            transform: rotate(-15deg);
            filter: blur(1px);
        }

        .bebo-robot::after {
            content: '';
            position: absolute;
            inset: auto auto 8px 8px;
            width: 45px;
            height: 15px;
            background: rgba(0,0,0,0.18);
            border-radius: 999px;
            filter: blur(2px);
        }

        @media (min-width: 768px) {
            .bebo-robot::before {
                inset: 8px 10px auto auto;
                width: 32px;
                height: 24px;
            }

            .bebo-robot::after {
                inset: auto auto 10px 10px;
                width: 60px;
                height: 20px;
            }
        }

        .bebo-robot.ready { transform: translateZ(0px); }
        .bebo-robot.success { box-shadow: inset 0 8px 18px rgba(255,255,255,0.08), 0 30px 72px rgba(34,197,94,0.2); }
        .bebo-robot.error { box-shadow: inset 0 8px 18px rgba(255,255,255,0.08), 0 30px 72px rgba(220,38,38,0.2); }

        .eyes-container { display: flex; gap: 8px; }
        .eye {
            width: 14px;
            height: 6px;
            background: #fbbf24;
            border-radius: 999px;
            box-shadow: 0 0 12px rgba(251,191,36,0.6);
            transition: all 0.25s ease;
        }
        .bebo-robot.ready .eye {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fbbf24;
            box-shadow: 0 0 10px rgba(251,191,36,0.6);
            transform: none;
        }
        .bebo-robot.success .eye {
            background: #22c55e;
            box-shadow: 0 0 14px rgba(34,197,94,0.75);
            width: 12px;
            height: 4px;
            border-radius: 50% 50% 0 0;
            transform: none;
        }
        .bebo-robot.error .eye {
            background: #ef4444;
            box-shadow: 0 0 14px rgba(239,68,68,0.75);
            width: 10px;
            height: 4px;
            border-radius: 2px;
            transform: rotate(-15deg);
        }

        @media (min-width: 768px) {
            .eyes-container { gap: 10px; }
            .eye {
                width: 18px;
                height: 8px;
            }
            .bebo-robot.ready .eye {
                width: 10px;
                height: 10px;
            }
            .bebo-robot.success .eye {
                width: 16px;
                height: 5px;
            }
            .bebo-robot.error .eye {
                width: 14px;
                height: 5px;
            }
        }
        .bebo-robot.error .eye:last-child { transform: rotate(15deg); }

        .arabic-text {
            font-family: 'Noto Sans Arabic', sans-serif;
            display: block;
            margin-top: 0.1rem;
            opacity: 0.8;
            font-size: 0.8em;
        }

        @media (min-width: 768px) {
            .arabic-text {
                font-size: 0.85em;
                margin-top: 0.15rem;
            }
        }

        @media (max-width: 640px) {
            .nav-text { display: inline-block; }
            #qText { font-size: 1rem; }
            .option-btn { padding: 0.65rem; }
            .nav-btn-container { padding: 0.5rem 0.75rem; }
            .cinematic-header {
                padding-top: 0.65rem;
                padding-bottom: 0.65rem;
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
            .material-title {
                font-size: 0.95rem;
            }
            .status-pill {
                padding: 0.2rem 0.6rem;
                font-size: 0.68rem;
            }
            #progressText.status-pill {
                font-size: 0.7rem;
            }
            #percentageLabel.status-pill,
            #score-pill.status-pill {
                font-size: 0.82rem;
            }
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="cinematic-header py-2 px-3 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <h1 class="material-title text-sm md:text-xl font-bold text-yellow-500 uppercase">Finishing</h1>
        <div class="flex items-center gap-1">
            <div id="progressText" class="status-pill">Q 1/134</div>
            <div id="percentageLabel" class="status-pill text-yellow-500">0%</div>
            <div id="score-pill" class="status-pill">S: 0</div>
        </div>
    </div>
</header>
    <section id="bebo-wrapper" class="bebo-wrapper">
        <div id="bebo-bubble" class="bebo-bubble">مرحبا! جاهز للتحدي؟</div>
        <div id="bebo-robot" class="bebo-robot ready" aria-label="Bebo assistant robot">
            <div class="eyes-container">
                <span class="eye"></span>
                <span class="eye"></span>
            </div>
        </div>
    </section>

    <div class="progress-container">
        <div class="max-w-sm md:max-w-4xl mx-auto">
            <div class="progress-bar-wrapper">
                <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <main class="flex-grow flex items-center justify-center p-2 md:p-6">
        <div id="quiz-container" class="w-full max-w-sm md:max-w-xl">
            <div class="flex justify-end mb-1.5 md:mb-2">
                <button id="hintBtn" class="bulb-icon p-1.5 md:p-2 bg-yellow-500/10 text-yellow-500 rounded-full border border-yellow-500/20" title="Show Hint">
                    <i data-lucide="lightbulb" class="w-3.5 h-3.5 md:w-4 md:h-4"></i>
                </button>
            </div>

            <div class="glass-card p-4 md:p-8 relative">
                <div id="hint-text" class="hidden mb-3 md:mb-4 p-2 md:p-3 bg-yellow-500/10 border border-yellow-500/20 rounded text-[10px] md:text-sm italic text-yellow-200"></div>

                <div id="questionArea">
                    <div id="question-number" class="text-[9px] uppercase tracking-widest text-yellow-500/60 font-bold mb-3"></div>
                    <span id="qType" class="text-[9px] uppercase tracking-widest text-yellow-500/60 font-bold mb-1 block"></span>
                    <h2 id="qText" class="font-light leading-snug mb-4 md:mb-5 text-sm md:text-base text-white"></h2>
                    <div id="options-container" class="grid grid-cols-1 gap-1.5 md:gap-2"></div>
                </div>

                <div class="flex justify-between items-center mt-4 md:mt-6 border-t border-white/5 pt-3 md:pt-5">
                    <button id="prevBtn" onclick="prevQuestion()" class="nav-btn-container flex items-center gap-1 px-2 md:px-3 py-1.5 md:py-2 rounded bg-white/5 text-xs disabled:opacity-20">
                        <i data-lucide="chevron-left" class="w-3 h-3 md:w-4 md:h-4"></i> <span class="nav-text text-xs">Back/السابق</span>
                    </button>
                    <div class="flex gap-1 md:gap-2">
                        <button onclick="skipQuestion()" class="px-2 md:px-3 py-1.5 md:py-2 rounded border border-white/5 text-[9px] md:text-[10px] opacity-50">Skip/تخطي</button>
                        <button id="nextBtn" onclick="nextQuestion()" class="nav-btn-container flex items-center gap-1 px-3 md:px-5 py-1.5 md:py-2 rounded bg-yellow-600 text-white font-bold text-xs">
                            <span class="nav-text text-xs">Next/التالي</span> <i data-lucide="chevron-right" class="w-3 h-3 md:w-4 md:h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="result-view" class="hidden w-full max-w-sm md:max-w-md text-center glass-card p-6 md:p-8 relative">
    <div id="result-accent" class="absolute top-0 left-0 w-full h-1 bg-yellow-500"></div>
    
    <div id="finalScoreDisplay" class="text-[2.55rem] md:text-[3.5rem] font-extrabold text-yellow-400 mb-2 mt-4">0%</div>
    
    <div id="result-message" class="result-message-text mb-3 md:mb-4"></div>
    
    <div class="grid grid-cols-2 gap-1.5 md:gap-2 mt-4 md:mt-6">
        <div class="p-3 result-metric rounded">
            <div id="correctCount" class="result-metric-value text-green-400">0</div>
            <div class="result-metric-label text-green-300">Correct</div>
        </div>
        <div class="p-3 result-metric rounded">
            <div id="wrongCount" class="result-metric-value text-red-400">0</div>
            <div class="result-metric-label text-red-300">Wrong</div>
        </div>
    </div>
    
    <button onclick="restartQuiz()" class="mt-6 md:mt-8 bg-yellow-600 text-white px-6 md:px-8 py-1.5 md:py-2 rounded-full text-xs font-bold">Restart</button>
</div>
    </main>

    <footer class="py-2 md:py-4 text-center border-t border-white/5 bg-black/20">
        <p class="text-gray-500 text-sm md:text-[15px] font-medium">By <span class="text-yellow-500/60">Developer Bilal Mohammed</span></p>
    </footer>

    <script>
        const rawData = [
            // --- 70 True & False Questions ---
            {type:'tf',q:'Processing cotton in yarn form is more common than in fabric form.',a:'False',q_ar:'معالجة القطن في شكل خيوط هي أكثر شيوعاً من شكل القماش.',a_ar:'خطأ'},
            {type:'tf',q:'Lot uniformity (width & weight) is essential for consistent chemical processing.',a:'True',q_ar:'توحيد الدفعة (العرض والوزن) ضروري لمعالجة كيميائية متسقة.',a_ar:'صح'},
            {type:'tf',q:'Seam strength has no effect on continuous processing operations.',a:'False',q_ar:'قوة الوصلة ليس لها تأثير على عمليات المعالجة المستمرة.',a_ar:'خطأ'},
            {type:'tf',q:'Bonding using polymers eliminates mechanical stress caused by stitching.',a:'True',q_ar:'الربط باستخدام البوليمرات يزيل الإجهاد الميكانيكي الناتج عن الخياطة.',a_ar:'صح'},
            {type:'tf',q:'Improper inspection can lead to defects during bleaching and dyeing stages.',a:'True',q_ar:'التفتيش غير السليم قد يؤدي إلى عيوب خلال مراحل التبييض والصباغة.',a_ar:'صح'},
            {type:'tf',q:'Electronic inspection completely eliminates the need for human supervision.',a:'False',q_ar:'التفتيش الإلكتروني يزيل تماماً الحاجة للإشراف البشري.',a_ar:'خطأ'},
            {type:'tf',q:'Non-scourable oils interfere with dye-fiber interaction.',a:'True',q_ar:'الزيوت غير القابلة للإزالة تتداخل مع تفاعل الصبغة والألياف.',a_ar:'صح'},
            {type:'tf',q:'Cutting damaged areas is always avoided to reduce material loss.',a:'False',q_ar:'يتم دائماً تجنب قطع المناطق التالفة لتقليل فقد المواد.',a_ar:'خطأ'},
            {type:'tf',q:'Fluorescent lighting enhances visibility of fabric defects.',a:'True',q_ar:'الإضاءة الفلورية تعزز من وضوح عيوب القماش.',a_ar:'صح'},
            {type:'tf',q:'Spotting should be followed by drying before washing to fix the stain remover.',a:'False',q_ar:'يجب أن يتبع إزالة البقع التجفيف قبل الغسيل لتثبيت مزيل البقع.',a_ar:'خطأ'},
            {type:'tf',q:'Uniform lot formation minimizes variation in chemical uptake during processing.',a:'True',q_ar:'تكوين دفعة موحدة يقلل من التباين في امتصاص المواد الكيميائية أثناء المعالجة.',a_ar:'صح'},
            {type:'tf',q:'Sewing seams too narrow may lead to failure during tension processes.',a:'True',q_ar:'خياطة الوصلات الضيقة جداً قد تؤدي إلى فشلها خلال عمليات الشد.',a_ar:'صح'},
            {type:'tf',q:'Polymer bonding increases rag formation compared to stitching.',a:'False',q_ar:'الربط بالبوليمر يزيد من تكوين الخرق مقارنة بالخياطة.',a_ar:'خطأ'},
            {type:'tf',q:'Inspection under insufficient light may hide critical fabric defects.',a:'True',q_ar:'التفتيش تحت ضوء غير كافٍ قد يخفي عيوب القماش الحرجة.',a_ar:'صح'},
            {type:'tf',q:'Cutting heavily damaged areas is sometimes necessary despite material loss.',a:'True',q_ar:'قطع المناطق المتضررة بشدة ضروري أحياناً رغم فقدان المواد.',a_ar:'صح'},
            {type:'tf',q:'Oily stains can lead to localized weak spots during bleaching.',a:'True',q_ar:'يمكن أن تؤدي البقع الزيتية إلى نقاط ضعف موضعية أثناء التبييض.',a_ar:'صح'},
            {type:'tf',q:'Electronic inspection ensures zero defects in final fabric.',a:'False',q_ar:'التفتيش الإلكتروني يضمن خلو القماش النهائي من العيوب.',a_ar:'خطأ'},
            {type:'tf',q:'Similar fabric weight in a lot ensures uniform drying rate.',a:'True',q_ar:'وزن القماش المتماثل في الدفعة يضمن معدل تجفيف موحد.',a_ar:'صح'},
            {type:'tf',q:'The purpose of mending is only aesthetic improvement.',a:'False',q_ar:'الغرض من الترقيع هو التحسين الجمالي فقط.',a_ar:'خطأ'},
            {type:'tf',q:'Emulsified solvents improve removal of hydrophobic contaminants.',a:'True',q_ar:'المذيبات المستحلبة تحسن إزالة الملوثات الطاردة للماء.',a_ar:'صح'},
            {type:'tf',q:'Protruding fibers improve dye penetration during dyeing processes.',a:'False',q_ar:'الألياف البارزة تحسن اختراق الصبغة أثناء عمليات الصباغة.',a_ar:'خطأ'},
            {type:'tf',q:'Shearing is used to remove surface fibers from fabric.',a:'True',q_ar:'يستخدم القص (Shearing) لإزالة الألياف السطحية من القماش.',a_ar:'صح'},
            {type:'tf',q:'Shearing is always performed on fully wet fabrics.',a:'False',q_ar:'يتم القص دائماً على الأقمشة المبللة تماماً.',a_ar:'خطأ'},
            {type:'tf',q:'The shearing mechanism is similar to a lawn mower.',a:'True',q_ar:'آلية القص تشبه جزازة العشب.',a_ar:'صح'},
            {type:'tf',q:'Cylinder speed in shearing machines is always constant.',a:'False',q_ar:'سرعة الأسطوانة في آلات القص ثابتة دائماً.',a_ar:'خطأ'},
            {type:'tf',q:'Modern shearing machines may have asymmetrical spiral arrangements.',a:'True',q_ar:'آلات القص الحديثة قد تحتوي على ترتيبات لولبية غير متماثلة.',a_ar:'صح'},
            {type:'tf',q:'Spiral blades are aligned in the same direction as cylinder rotation.',a:'False',q_ar:'تتم محاذاة الشفرات اللولبية في نفس اتجاه دوران الأسطوانة.',a_ar:'خطأ'},
            {type:'tf',q:'Increasing cutting angle improves cutting precision.',a:'False',q_ar:'زيادة زاوية القطع تحسن من دقة القص.',a_ar:'خطأ'},

        function clearBebo() {
            const robot = document.getElementById('bebo-robot');
            const bubble = document.getElementById('bebo-bubble');
            bubble.classList.remove('active');
            bubble.innerText = '';
            if (userAns[idx] === null) {
                robot.className = 'bebo-robot ready';
            }
        }

        function setBebo(state, category, specificIdx = -1) {
            const robot = document.getElementById('bebo-robot');
            const bubble = document.getElementById('bebo-bubble');
            robot.className = `bebo-robot ${state}`;
            const msgs = beboMessages[category] || beboMessages.intro;
            const chosenMsg = specificIdx >= 0 ? msgs[specificIdx % msgs.length] : msgs[Math.floor(Math.random() * msgs.length)];
            bubble.innerText = chosenMsg;
            bubble.classList.add('active');
            triggerBeboFlash();
            setTimeout(() => {
                bubble.classList.remove('active');
                if (userAns[idx] === null) robot.classList.remove('success', 'error');
            }, 3200);
        }

        function triggerBeboFlash() {
            const robot = document.getElementById('bebo-robot');
            robot.classList.add('flash');
            requestAnimationFrame(() => robot.classList.remove('flash'));
        }

        function toggleHint() {
            const hintText = document.getElementById('hint-text');
            const hintBtn = document.getElementById('hintBtn');
            hintText.classList.toggle('hidden');
            hintBtn.classList.toggle('bulb-active');
        }

        function correctAnswerIndex(question) {
            if (question.type === 'tf') {
                return question.a === 'True' ? 0 : 1;
            }
            return question.o.findIndex(option => option === question.a);
        }

        function render() {
            const q = quizData[idx];
            const answered = userAns[idx] !== null;
            const robot = document.getElementById('bebo-robot');
            if (!answered) {
                clearBebo();
                robot.className = 'bebo-robot ready';
            }

            const progressPct = Math.round(((idx + 1) / quizData.length) * 100);
            document.getElementById('progressText').innerText = `Q ${idx + 1} / ${quizData.length}`;
            document.getElementById('percentageLabel').innerText = `${progressPct}%`;
            document.getElementById('score-pill').innerText = `SCORE: ${score}`;
            document.getElementById('progress-fill').style.width = `${progressPct}%`;
            document.getElementById('question-number').innerText = `ASSESSMENT POINT ${idx + 1} OF ${quizData.length}`;
            document.getElementById('qType').innerText = q.type === 'tf' ? 'True / False | صح أم خطأ' : 'Choice | اختيار من متعدد';
            document.getElementById('qText').innerHTML = `<div>${q.q}</div><div class="arabic-text text-yellow-500/80" dir="rtl">${q.q_ar}</div>`;

            const hintText = document.getElementById('hint-text');
            hintText.innerText = q.h_ar || q.h || q.hint || '';
            hintText.classList.add('hidden');

            const grid = document.getElementById('options-container');
            grid.innerHTML = '';
            const optsEn = q.type === 'tf' ? ['True', 'False'] : q.o;
            const optsAr = q.type === 'tf' ? ['صح', 'خطأ'] : q.o_ar;
            const correctIndex = correctAnswerIndex(q);

            optsEn.forEach((en, i) => {
                const btn = document.createElement('button');
                btn.className = `option-btn w-full p-3 rounded-lg text-xs md:text-sm text-left relative overflow-hidden group`;
                btn.innerHTML = `<span class="block text-white">${en}</span><span class="arabic-text text-white/40" dir="rtl">${optsAr[i] || ''}</span>`;
                btn.onclick = () => select(i);
                if (answered) {
                    btn.disabled = true;
                    if (i === correctIndex) btn.classList.add('btn-correct');
                    if (i === userAns[idx] && i !== correctIndex) btn.classList.add('btn-wrong');
                }
                grid.appendChild(btn);
            });
            document.getElementById('prevBtn').disabled = idx === 0;
        }

        function select(choiceIndex) {
            if (userAns[idx] !== null) return;
            const q = quizData[idx];
            const correctIndex = correctAnswerIndex(q);
            userAns[idx] = choiceIndex;

            const buttons = document.querySelectorAll('#options-container .option-btn');
            if (choiceIndex === correctIndex) {
                score += 1;
                mistakes = 0;
                buttons[choiceIndex].classList.add('btn-correct');
                setBebo('success', 'correct', idx);
            } else {
                mistakes += 1;
                buttons[choiceIndex].classList.add('btn-wrong');
                setBebo('error', 'wrong', idx);
                if (correctIndex >= 0 && buttons[correctIndex]) {
                    buttons[correctIndex].classList.add('btn-correct');
                }
            }

            buttons.forEach(button => button.disabled = true);
            document.getElementById('score-pill').innerText = `SCORE: ${score}`;
        }

        function nextQuestion() {
            if (idx < quizData.length - 1) {
                clearBebo();
                idx += 1;
                render();
            } else {
                finish();
            }
        }

        function prevQuestion() {
            if (idx > 0) {
                clearBebo();
                idx -= 1;
                render();
            }
        }

        function skipQuestion() {
            if (idx < quizData.length - 1) {
                clearBebo();
                idx += 1;
                render();
            } else {
                finish();
            }
        }

        function finish() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');

            const totalQuestions = quizData.length;
            const correctCount = userAns.reduce((acc, choice, i) => {
                return choice === correctAnswerIndex(quizData[i]) ? acc + 1 : acc;
            }, 0);
            
            const wrongCount = totalQuestions - correctCount;
            const pct = Math.round((correctCount / totalQuestions) * 100);
            
            const resultMessage = document.getElementById('result-message');
            const resultAccent = document.getElementById('result-accent');
            const finalScoreDisplay = document.getElementById('finalScoreDisplay');

            // تحديث النسبة المئوية والعدادات
            finalScoreDisplay.innerText = `${pct}%`;
            document.getElementById('correctCount').innerText = correctCount;
            document.getElementById('wrongCount').innerText = wrongCount;

            // اختيار الرسالة بناءً على الشرط (أكبر من أو يساوي 80%)
            if (pct >= 80) {
                const messagePool = beboMessages.resultsSuccess;
                resultMessage.innerText = messagePool[Math.floor(Math.random() * messagePool.length)];
                resultAccent.className = "absolute top-0 left-0 w-full h-1 bg-green-500";
            } else {
                const messagePool = beboMessages.resultsAdvice;
                resultMessage.innerText = messagePool[Math.floor(Math.random() * messagePool.length)];
                resultAccent.className = "absolute top-0 left-0 w-full h-1 bg-red-600";
            }
        }

        function restartQuiz() {
            idx = 0;
            userAns.fill(null);
            score = 0;
            mistakes = 0;
            document.getElementById('result-view').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            render();
            setBebo('ready', 'intro');
        }

        window.onload = () => {
            lucide.createIcons();
            render();
            setBebo('ready', 'intro');
            document.getElementById('hintBtn').onclick = toggleHint;
        };
    </script>
